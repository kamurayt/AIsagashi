<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI鑑定士</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0D0D0D;
    color: #E8E0D0;
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 12px;
    overflow-x: hidden;
  }
  #scanline {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 10;
    transition: background 0.05s;
  }
  .card {
    margin-top: 8vh;
    text-align: center;
    max-width: 460px;
    width: 100%;
  }
  .eyebrow {
    font-family: monospace;
    letter-spacing: 0.25em;
    font-size: 11px;
    color: #A78BFA;
    margin-bottom: 10px;
  }
  h1 {
    font-size: clamp(38px, 9vw, 60px);
    font-weight: 900;
    letter-spacing: -0.02em;
    margin-bottom: 14px;
  }
  .sub {
    color: #9CA3AF;
    font-size: 14px;
    line-height: 1.8;
    margin-bottom: 24px;
  }
  .rules {
    background: #141414;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 24px;
    text-align: left;
  }
  .rule { font-size: 13px; color: #D1D5DB; padding: 4px 0; }
  .btn-main {
    background: #A78BFA; color: #fff;
    border: none; border-radius: 8px;
    padding: 13px 36px; font-size: 15px;
    font-weight: 700; cursor: pointer;
    letter-spacing: 0.05em;
  }
  .best-tag {
    margin-top: 14px; color: #A78BFA;
    font-size: 12px; font-family: monospace;
  }
  /* ゲーム画面 */
  #game-screen { width: 100%; max-width: 540px; display: none; flex-direction: column; align-items: center; }
  .hdr {
    width: 100%; display: flex;
    align-items: center; gap: 10px; margin-bottom: 12px;
  }
  .streak-badge {
    background: #1A1A1A; border: 1px solid #333;
    border-radius: 20px; padding: 3px 10px;
    font-size: 13px; font-weight: 700;
    color: #FCD34D; flex: 1; text-align: right;
  }
  .diff-pill {
    border-radius: 20px; padding: 3px 10px;
    font-size: 12px; color: #E8E0D0;
    background: #1A1A1A; border: 1px solid #333;
  }
  .img-wrap {
    width: 100%; aspect-ratio: 3/2;
    position: relative; border-radius: 10px;
    overflow: hidden; border: 1px solid #222;
    background: #111; margin-bottom: 14px;
  }
  #game-img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    transition: opacity 0.4s, filter 0.4s;
    opacity: 0;
  }
  .img-overlay {
    position: absolute; inset: 0;
    pointer-events: none;
    transition: background 0.4s;
  }
  .loading-wrap {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
  }
  .spinner {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid #333;
    border-top-color: #A78BFA;
    animation: spin 0.8s linear infinite;
  }
  .loading-txt { font-size: 12px; color: #555; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .timer-badge {
    position: absolute; top: 10px; right: 10px;
    background: rgba(0,0,0,0.75);
    border: 1px solid #444; border-radius: 6px;
    padding: 4px 10px; font-size: 18px;
    font-weight: 700; font-family: monospace;
    color: #E8E0D0; transition: all 0.3s;
  }
  .timer-badge.urgent {
    background: #7F1D1D; border-color: #DC2626; color: #FCA5A5;
  }
  .result-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center;
    justify-content: center;
    font-size: 28px; font-weight: 800;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }
  .btn-row { display: flex; gap: 10px; margin-bottom: 14px; width: 100%; }
  .btn-real {
    flex: 1; background: #0D2818;
    border: 2px solid #4ADE80; border-radius: 10px;
    color: #4ADE80; font-size: 18px;
    font-weight: 700; padding: 15px 0; cursor: pointer;
  }
  .btn-ai {
    flex: 1; background: #1A0D33;
    border: 2px solid #A78BFA; border-radius: 10px;
    color: #A78BFA; font-size: 18px;
    font-weight: 700; padding: 15px 0; cursor: pointer;
  }
  .analysis-box {
    width: 100%; background: #141414;
    border: 1px solid #222; border-radius: 10px;
    padding: 14px 16px; margin-bottom: 14px;
  }
  .answer-tag { font-size: 12px; color: #9CA3AF; margin-bottom: 8px; font-family: monospace; }
  .analysis-txt { font-size: 14px; line-height: 1.7; color: #E8E0D0; margin-bottom: 10px; }
  .analyzing { color: #A78BFA; font-size: 13px; }
  .btn-next {
    background: transparent; border: 1px solid #A78BFA;
    border-radius: 6px; color: #A78BFA;
    padding: 7px 18px; font-size: 13px;
    cursor: pointer; font-weight: 600;
  }
  /* ゲームオーバー */
  #gameover-screen { display: none; text-align: center; max-width: 460px; width: 100%; margin-top: 8vh; }
  .big-num { font-size: clamp(64px,16vw,96px); font-weight: 900; line-height: 1; margin: 8px 0 0; }
  .big-label { font-size: 18px; color: #9CA3AF; margin-bottom: 16px; }
  .verdict { font-size: 20px; margin-bottom: 24px; color: #FCD34D; }
  .share-btn {
    flex: 1; background: #111;
    border: 2px solid #E8E0D0; border-radius: 8px;
    color: #E8E0D0; font-size: 14px;
    font-weight: 700; padding: 13px 0;
    cursor: pointer; text-decoration: none;
    display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body>

<div id="scanline"></div>

<!-- スタート画面 -->
<div id="start-screen" class="card">
  <div class="eyebrow">AI DETECTOR</div>
  <h1>AI鑑定士</h1>
  <p class="sub">本物の写真か、AI生成画像か。<br>あなたの目利き力を試せ。</p>
  <div class="rules">
    <div class="rule">📷 本物 or 🤖 AI を2択で判定</div>
    <div class="rule">✅ 正解し続けるほど難易度アップ</div>
    <div class="rule">❌ 1問でも間違えたらゲームオーバー</div>
    <div class="rule">⏱ 上級以降は時間制限あり</div>
  </div>
  <button class="btn-main" onclick="startGame()">鑑定を始める</button>
  <div class="best-tag" id="start-best"></div>
</div>

<!-- ゲーム画面 -->
<div id="game-screen">
  <div class="hdr">
    <span class="eyebrow">AI鑑定士</span>
    <span class="streak-badge" id="streak-badge">🔥 0連勝</span>
    <span class="diff-pill" id="diff-pill">初級</span>
  </div>
  <div class="img-wrap">
    <div class="loading-wrap" id="loading-wrap">
      <div class="spinner"></div>
      <span class="loading-txt">画像を生成中...</span>
    </div>
    <img id="game-img" src="" alt="鑑定画像" />
    <div class="img-overlay" id="img-overlay"></div>
    <div class="timer-badge" id="timer-badge" style="display:none"></div>
    <div class="result-overlay" id="result-overlay" style="display:none"></div>
  </div>
  <div class="btn-row" id="answer-btns">
    <button class="btn-real" onclick="handleAnswer(true)">📷 本物</button>
    <button class="btn-ai" onclick="handleAnswer(false)">🤖 AI生成</button>
  </div>
  <div class="analysis-box" id="analysis-box" style="display:none">
    <div class="answer-tag" id="answer-tag"></div>
    <div id="analysis-content" class="analyzing">鑑定中...</div>
    <button class="btn-next" id="btn-next" style="display:none" onclick="nextQuestion()">次の問題 →</button>
  </div>
</div>

<!-- ゲームオーバー画面 -->
<div id="gameover-screen">
  <div class="eyebrow" style="color:#FF4444">GAME OVER</div>
  <div class="big-num" id="go-streak">0</div>
  <div class="big-label">連勝</div>
  <div class="diff-pill" id="go-diff" style="display:inline-block;margin-bottom:16px"></div>
  <div class="verdict" id="go-verdict"></div>
  <div class="btn-row">
    <button class="btn-main" onclick="startGame()">もう一度</button>
    <a id="share-link" href="#" target="_blank" class="share-btn">Xでシェア</a>
  </div>
  <div class="best-tag" id="go-best"></div>
</div>

<script>
const CATEGORIES = [
  { label: "自然",       unsplash: "nature,landscape",  pollinations: "beautiful natural landscape photorealistic" },
  { label: "都市",       unsplash: "city,urban",        pollinations: "urban cityscape at night photorealistic" },
  { label: "料理",       unsplash: "food,meal",         pollinations: "delicious food dish photography photorealistic" },
  { label: "動物",       unsplash: "animal,wildlife",   pollinations: "wildlife animal in nature photorealistic" },
  { label: "インテリア", unsplash: "interior,room",     pollinations: "beautiful room interior design photorealistic" },
];

const DIFFS = [
  { streak: 0,  label: "初級", time: null },
  { streak: 4,  label: "中級", time: null },
  { streak: 8,  label: "上級", time: 10 },
  { streak: 13, label: "鬼級", time: 6 },
];

let streak = 0, best = 0;
let currentQ = null;
let answered = false;
let timerInterval = null;
let timeLeft = null;
let scanPos = 0;

// スキャンライン
setInterval(() => {
  scanPos = (scanPos + 1) % 100;
  document.getElementById('scanline').style.background =
    `linear-gradient(to bottom,transparent ${scanPos}%,rgba(167,139,250,0.04) ${scanPos+0.4}%,transparent ${scanPos+0.8}%)`;
}, 25);

function getDiff(s) {
  let d = DIFFS[0];
  for (const l of DIFFS) { if (s >= l.streak) d = l; }
  return d;
}

function buildQuestion() {
  const seed = Date.now() + Math.floor(Math.random() * 99999);
  const cat = CATEGORIES[Math.floor(Math.random() * CATEGORIES.length)];
  const isReal = Math.random() > 0.5;
  const realSrc = `https://source.unsplash.com/600x400/?${cat.unsplash}&sig=${seed}`;
  const aiPrompt = encodeURIComponent(`${cat.pollinations}, high quality 8k`);
  const aiSrc = `https://image.pollinations.ai/prompt/${aiPrompt}?width=600&height=400&seed=${seed}&nologo=true`;
  return { isReal, src: isReal ? realSrc : aiSrc, category: cat.label, seed };
}

function show(id) { document.getElementById(id).style.display = 'flex'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }
function showBlock(id) { document.getElementById(id).style.display = 'block'; }

function startGame() {
  streak = 0;
  hide('start-screen');
  hide('gameover-screen');
  showBlock('game-screen');
  document.getElementById('game-screen').style.display = 'flex';
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  currentQ = buildQuestion();

  // UI リセット
  const img = document.getElementById('game-img');
  img.style.opacity = '0';
  img.style.filter = 'brightness(1)';
  show('loading-wrap');
  hide('result-overlay');
  hide('analysis-box');
  hide('timer-badge');
  show('answer-btns');
  document.getElementById('img-overlay').style.background = 'rgba(167,139,250,0.03)';

  // ストリーク・難易度更新
  const diff = getDiff(streak);
  document.getElementById('streak-badge').textContent = `🔥 ${streak}連勝`;
  const dp = document.getElementById('diff-pill');
  dp.textContent = diff.label;
  dp.style.background = diff.label === '鬼級' ? '#7F1D1D' : diff.label === '上級' ? '#1E3A5F' : '#1A1A1A';
  dp.style.border = `1px solid ${diff.label === '鬼級' ? '#DC2626' : diff.label === '上級' ? '#0EA5E9' : '#333'}`;

  // 画像ロード
  img.onload = () => {
    hide('loading-wrap');
    img.style.opacity = '1';
    if (diff.time) startTimer(diff.time);
  };
  img.onerror = () => {
    hide('loading-wrap');
    img.style.opacity = '1';
  };
  img.src = currentQ.src;
}

function startTimer(seconds) {
  clearInterval(timerInterval);
  timeLeft = seconds;
  const badge = document.getElementById('timer-badge');
  badge.style.display = 'block';
  badge.textContent = `⏱ ${timeLeft}`;
  timerInterval = setInterval(() => {
    timeLeft--;
    badge.textContent = `⏱ ${timeLeft}`;
    if (timeLeft <= 3) {
      badge.classList.add('urgent');
    }
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      handleAnswer(null);
    }
  }, 1000);
}

async function handleAnswer(userSaysReal) {
  if (answered || !currentQ) return;
  answered = true;
  clearInterval(timerInterval);
  hide('answer-btns');
  hide('timer-badge');
  document.getElementById('timer-badge').classList.remove('urgent');

  const correct = userSaysReal === null ? false : userSaysReal === currentQ.isReal;
  const img = document.getElementById('game-img');
  const overlay = document.getElementById('result-overlay');
  const imgOverlay = document.getElementById('img-overlay');

  if (correct) {
    overlay.textContent = '✅ 正解！';
    overlay.style.color = '#4ADE80';
    overlay.style.background = 'rgba(74,222,128,0.15)';
    imgOverlay.style.background = 'rgba(74,222,128,0.08)';
    streak++;
    if (streak > best) best = streak;
  } else {
    overlay.textContent = '❌ 不正解';
    overlay.style.color = '#FF4444';
    overlay.style.background = 'rgba(255,68,68,0.2)';
    imgOverlay.style.background = 'rgba(255,68,68,0.18)';
    img.style.filter = 'brightness(0.45) saturate(0.2)';
  }
  show('result-overlay');

  // 答え合わせ表示
  showBlock('analysis-box');
  document.getElementById('answer-tag').textContent =
    `正解：${currentQ.isReal ? '📷 本物の写真' : `🤖 AI生成（${currentQ.category}）`}`;
  document.getElementById('analysis-content').className = 'analyzing';
  document.getElementById('analysis-content').textContent = '鑑定中...';
  hide('btn-next');

  // Claudeに解説を求める
  fetchAnalysis(currentQ, correct).then(text => {
    document.getElementById('analysis-content').className = 'analysis-txt';
    document.getElementById('analysis-content').textContent = text;
    if (correct) {
      showBlock('btn-next');
    } else {
      setTimeout(showGameOver, 1200);
    }
  });
}

async function fetchAnalysis(q, correct) {
  try {
    const prompt = `ゲームの答え合わせコメントを日本語で2文以内で書いてください。カテゴリ：${q.category}。正解：${q.isReal ? "本物の写真" : "AI生成画像"}。ユーザーの答え：${correct ? "正解" : "不正解"}。${q.isReal ? "本物写真の見分け方のヒントを一言" : "AI画像の不自然な特徴を一言"}。絵文字1つOK。`;
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }],
      }),
    });
    const data = await res.json();
    return data.content?.map(b => b.text || "").join("") || "鑑定完了！";
  } catch {
    return "鑑定コメントを取得できませんでした。";
  }
}

function nextQuestion() {
  loadQuestion();
}

function showGameOver() {
  hide('game-screen');
  const diff = getDiff(streak);
  document.getElementById('go-streak').textContent = streak;
  const gd = document.getElementById('go-diff');
  gd.textContent = diff.label + 'まで到達';
  gd.style.background = diff.label === '鬼級' ? '#7F1D1D' : diff.label === '上級' ? '#1E3A5F' : '#1A1A1A';
  gd.style.border = `1px solid ${diff.label === '鬼級' ? '#DC2626' : diff.label === '上級' ? '#0EA5E9' : '#333'}`;
  document.getElementById('go-verdict').textContent =
    streak >= 13 ? '🔥 伝説の鑑定士！' : streak >= 8 ? '🏆 鋭い目を持っている' : streak >= 4 ? '👁️ なかなかやるな' : '🤖 AIに完敗...';
  document.getElementById('go-best').textContent = best > 0 ? `🏆 ベスト ${best}連勝` : '';
  const shareText = `【AI鑑定士】${streak}連勝！本物写真とAI画像を見破れる？ #AI鑑定士`;
  document.getElementById('share-link').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}`;
  document.getElementById('start-best').textContent = best > 0 ? `🏆 ベスト ${best}連勝` : '';
  showBlock('gameover-screen');
}
</script>
</body>
</html>
